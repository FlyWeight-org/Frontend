# Hashed Vite build assets are immutable; everything else (index.html, sw.js,
# workbox-*, manifest) must revalidate on every request so that deploys —
# including CSP header changes and service-worker updates — propagate
# immediately instead of being pinned by heuristic HTTP caching.
#
# `no-transform` on those revalidated responses also stops Cloudflare from
# injecting its JavaScript Detections script (window.__CF$cv$params → a
# challenge-platform inline <script>), which the zone's strict script-src
# would block for lack of 'unsafe-inline'. It is free-tier and cannot be
# disabled in the dashboard, so the origin opts out per response instead.
map $uri $cache_control {
    ~^/assets/  "public, max-age=31536000, immutable";
    default     "no-cache, no-transform";
}

server {
    listen  8080      default_server;
    listen  [::]:8080 default_server;
    server_name _;

    # Reject traffic that reached this origin without passing through
    # Cloudflare, which would otherwise bypass the zone's security headers,
    # WAF and analytics. Generated at startup; empty when no secret is set.
    include /etc/nginx/conf.d/origin-lock.inc;

    add_header Cache-Control $cache_control always;

    # Security headers. Content-Security-Policy is set by the zone's
    # response-header ruleset so it stays identical across every site.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        root      /usr/share/nginx/html;
        index     index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root  /usr/share/nginx/html;
    }
}

# Internal server for stub_status (not exposed externally)
server {
    listen 127.0.0.1:8081;
    server_name localhost;

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}

